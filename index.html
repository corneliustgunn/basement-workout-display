<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Workout Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Loading state -->
  <div id="loading" class="loading">Loading workout data...</div>

  <!-- Main app (hidden until data loads) -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header id="header" class="header">
      <div class="header-left">
        <span id="day-name" class="day-name"></span>
        <span id="date-display" class="date-display"></span>
      </div>
      <div class="header-center">
        <span id="workout-title" class="workout-title"></span>
      </div>
      <div class="header-right">
        <span id="cycle-info" class="cycle-info"></span>
      </div>
    </header>

    <!-- Program Navigator -->
    <nav id="navigator" class="navigator">
      <button id="nav-prev" class="nav-btn nav-arrow" title="Previous day">&larr;</button>
      <button id="nav-today" class="nav-btn nav-today-btn" title="Jump to today">Today</button>
      <input type="date" id="nav-date-picker" class="nav-date-picker" title="Pick a date">
      <button id="nav-next" class="nav-btn nav-arrow" title="Next day">&rarr;</button>
      <span id="nav-offset-label" class="nav-offset-label hidden"></span>
    </nav>

    <!-- Lifting day layout -->
    <main id="lift-layout" class="lift-layout hidden">
      <section class="panel mobility-panel">
        <h2 class="panel-title mobility-title">Mobility Warm-Up</h2>
        <div id="mobility-content" class="panel-content"></div>
      </section>
      <section class="panel workout-panel">
        <h2 class="panel-title workout-panel-title">Today's Workout</h2>
        <div id="workout-content" class="panel-content"></div>
      </section>
      <section class="panel inspiration-panel">
        <h2 class="panel-title inspiration-title">Inspiration</h2>
        <div id="inspiration-content" class="inspiration-content">
          <blockquote id="insp-quote-text" class="insp-quote-text"></blockquote>
          <cite id="insp-quote-author" class="insp-quote-author"></cite>
        </div>
      </section>
    </main>

    <!-- Non-lifting day layout (fullscreen quote) -->
    <main id="rest-layout" class="rest-layout hidden">
      <div id="rest-quote" class="rest-quote">
        <blockquote id="rest-quote-text" class="rest-quote-text"></blockquote>
        <cite id="rest-quote-author" class="rest-quote-author"></cite>
      </div>
    </main>

    <!-- Quote bar (lifting days only) -->
    <footer id="quote-bar" class="quote-bar hidden">
      <blockquote id="quote-text" class="quote-text"></blockquote>
      <cite id="quote-author" class="quote-author"></cite>
    </footer>
  </div>

  <script src="js/quotes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
